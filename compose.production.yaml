name: truemetaverse

x-app-build: &app-build
  context: ./metaverse
  dockerfile: Dockerfile

x-app-environment: &app-environment
  DATABASE_URL: postgresql://${POSTGRES_USER:-truemetaverse}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/${POSTGRES_DB:-truemetaverse}
  JWT_PASSWORD: ${JWT_PASSWORD:?JWT_PASSWORD is required}

x-logging: &default-logging
  driver: local
  options:
    max-size: "10m"
    max-file: "5"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-truemetaverse}
      POSTGRES_USER: ${POSTGRES_USER:-truemetaverse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    restart: unless-stopped
    logging: *default-logging

  migrate:
    build:
      <<: *app-build
      target: http
    image: truemetaverse-http:production
    working_dir: /app/packages/db
    command: ["bunx", "prisma", "migrate", "deploy"]
    environment: *app-environment
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    logging: *default-logging

  seed:
    build:
      <<: *app-build
      target: http
    image: truemetaverse-http:production
    working_dir: /app/packages/db
    command: ["bun", "run", "seed.ts"]
    environment: *app-environment
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: "no"
    logging: *default-logging

  http:
    build:
      <<: *app-build
      target: http
    image: truemetaverse-http:production
    init: true
    environment:
      <<: *app-environment
      NODE_ENV: production
      PORT: 3000
      LIVEKIT_URL: ${LIVEKIT_PUBLIC_URL:?LIVEKIT_PUBLIC_URL is required}
      LIVEKIT_INTERNAL_URL: ws://host.docker.internal:7880
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:?LIVEKIT_API_KEY is required}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:?LIVEKIT_API_SECRET is required}
    extra_hosts:
      - host.docker.internal:host-gateway
    depends_on:
      seed:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "bun", "-e", "const r=await fetch('http://127.0.0.1:3000/healthz');if(!r.ok)process.exit(1)"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    logging: *default-logging

  ws:
    build:
      <<: *app-build
      target: ws
    image: truemetaverse-ws:production
    init: true
    environment:
      <<: *app-environment
      NODE_ENV: production
      PORT: 3001
    depends_on:
      seed:
        condition: service_completed_successfully
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    restart: unless-stopped
    logging: *default-logging

  web:
    build:
      <<: *app-build
      target: web
    image: truemetaverse-web:production
    ports:
      - 127.0.0.1:5173:8080
    depends_on:
      http:
        condition: service_healthy
      ws:
        condition: service_started
    restart: unless-stopped
    logging: *default-logging

volumes:
  postgres-data:
